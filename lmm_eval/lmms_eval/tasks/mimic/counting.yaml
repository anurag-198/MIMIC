dataset_path: anurag4446/mimic
dataset_name: counting
task: "counting"
dataset_kwargs:
  token: True
test_split: test
output_type: generate_until
doc_to_visual: !function counting_utils.doc_to_visual
doc_to_text: !function counting_utils.doc_to_text
doc_to_target: !function counting_utils.doc_to_target
process_results: !function counting_utils.process_results

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""

generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  do_sample: False

filter_list:
  - name: "flexible-extract"
    filter:
      - function: !function counting_utils.MultiChoiceRegexFilter_1
        group_select: 0
        ignore_case: true
        ignore_punctuation: true
        regex_pattern: "([A-Z])\\."

metric_list:
  - metric: counting_score_overall
    aggregation: !function counting_utils.aggregation 
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true

metadata:
  - version: 0.0
