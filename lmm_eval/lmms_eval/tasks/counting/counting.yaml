dataset_path: data/benchmarks/counting/counting
task: "counting"
dataset_kwargs:
  token: True
test_split: train
output_type: generate_until
doc_to_visual: !function utils.muir_doc_to_visual
doc_to_text: !function utils.muir_doc_to_text
doc_to_target: !function utils.muir_doc_to_target
process_results: !function utils.muir_process_results

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""

generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  do_sample: False

filter_list:
  - name: "flexible-extract"
    filter:
      - function: !function utils.MultiChoiceRegexFilter_1
        group_select: 0
        ignore_case: true
        ignore_punctuation: true
        regex_pattern: "([A-Z])\\."

metric_list:
  - metric: counting_score_overall
    aggregation: !function utils.muir_aggregation 
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true

metadata:
  - version: 0.0
